<!DOCTYPE html>
<html>
<head>
    <title>Smart Crop Advisory System</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
            padding: 40px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 20px;
            color: #cbd5f5;
        }

        form {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 20px;
            display: inline-block;
            backdrop-filter: blur(10px);
        }

        input {
            margin: 8px;
            padding: 12px;
            width: 220px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        button {
            padding: 12px 25px;
            margin-top: 15px;
            background: #22c55e;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #16a34a;
        }

        .result {
            margin-top: 25px;
            font-size: 18px;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            display: inline-block;
        }
    </style>
</head>

<body>

    <h1>🌱 Smart Crop Advisory System</h1>
    <p>AI-powered crop recommendation based on soil and climate conditions</p>

    <form id="form">
        <input type="text" placeholder="Enter City (optional)" id="city"><br>

        <input type="number" step="any" placeholder="Nitrogen" id="n"><br>
        <input type="number" step="any" placeholder="Phosphorus" id="p"><br>
        <input type="number" step="any" placeholder="Potassium" id="k"><br>
        <input type="number" step="any" placeholder="Temperature" id="t"><br>
        <input type="number" step="any" placeholder="Humidity" id="h"><br>
        <input type="number" step="any" placeholder="pH Value" id="ph"><br>
        <input type="number" step="any" placeholder="Rainfall" id="r"><br>

        <button type="submit">Predict</button>
    </form>

    <div class="result" id="result"></div>

    <script>
    document.getElementById("form").addEventListener("submit", async function(e) {
        e.preventDefault();

        let resultDiv = document.getElementById("result");
        resultDiv.innerHTML = "⏳ Analyzing soil & environmental data...";

        let features = [
            Number(n.value),
            Number(p.value),
            Number(k.value),
            Number(t.value),
            Number(h.value),
            Number(ph.value),
            Number(r.value)
        ];

        let res = await fetch("/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
        body: JSON.stringify({ features })
        });

        let data = await res.json();

        let riskColor = data.risk === "High" ? "red" :
                        data.risk === "Medium" ? "orange" : "lightgreen";

        resultDiv.innerHTML = `
            🌾 <b>${data.prediction}</b><br>
            📊 Confidence: ${data.confidence}%<br>
            ⚠️ Risk: <span style="color:${riskColor}">${data.risk}</span>
        `;
    });
    </script>

</body>
</html>
